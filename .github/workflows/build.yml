name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Haskell Language Server
      run: |
        curl -L https://github.com/haskell/haskell-language-server/releases/download/2.6.0.0/haskell-language-server-Linux-9.4.7.gz -o hls.gz
        gunzip hls.gz
        chmod +x hls
        sudo mv hls /usr/local/bin/

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests with coverage
      run: ./gradlew jacocoTestReport

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/reports/jacoco/test/html

  package:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - IDEA_VERSION: IC-2023.2.5
            JDK_VERSION: 17
          - IDEA_VERSION: IC-2024.1
            JDK_VERSION: 17
          - IDEA_VERSION: IU-LATEST-EAP-SNAPSHOT
            JDK_VERSION: 17

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        if: matrix.env.JDK_VERSION != '17'
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: temurin
          
      - name: Set up JDK 17
        if: matrix.env.JDK_VERSION == '17'
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin
          
      - name: Build with Gradle
        run: |
          ./gradlew -PideaVersion=${IDEA_VERSION} check buildPlugin
        env: ${{ matrix.env }}
          
      - name: Archive distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: "intellij-haskell-lsp-development"
          path: build/distributions/intellij-haskell-lsp-*.zip
        if: matrix.env.IDEA_VERSION == 'IC-2023.2.5'